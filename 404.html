<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Esta ruta aún no la construimos · GamaLabs</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230a0b10'/><circle cx='50' cy='50' r='26' fill='none' stroke='%237c5cff' stroke-width='6'/><circle cx='50' cy='50' r='8' fill='%233ff2c6'/></svg>">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b10;--ink:#f3f2fa;--muted:#9a99ad;--violet:#7c5cff;--aqua:#3ff2c6}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
  background:var(--bg);color:var(--ink);font-family:"General Sans",system-ui,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0}
main{position:relative;z-index:2;padding:24px;max-width:560px}
.code{font-size:clamp(5rem,18vw,10rem);font-weight:600;line-height:1;letter-spacing:-.03em;
  background:linear-gradient(100deg,var(--violet),var(--aqua));-webkit-background-clip:text;background-clip:text;color:transparent}
h1{font-weight:600;font-size:clamp(1.4rem,4vw,2rem);margin:8px 0 14px}
p{color:var(--muted);line-height:1.7}
a{display:inline-block;margin-top:30px;background:linear-gradient(100deg,var(--violet),#9b7dff);color:#fff;
  text-decoration:none;font-weight:600;padding:.9em 1.6em;border-radius:100px;
  box-shadow:0 10px 34px -12px rgba(124,92,255,.8)}
.mono{font-family:"JetBrains Mono",monospace}
.veil{position:fixed;inset:0;z-index:1;background:radial-gradient(70% 60% at 50% 45%,transparent,var(--bg) 85%)}
</style>
</head>
<body>
<canvas id="c" aria-hidden="true"></canvas>
<div class="veil"></div>
<main>
  <p class="code">404</p>
  <h1>Esta ruta aún no la construimos</h1>
  <p>La página que buscas no existe en este laboratorio. Pero podemos construir la que necesitas — nivel agencia, en días.</p>
  <a href="/gamalabs/">Volver al inicio</a>
</main>
<script>
// mismo lenguaje del hero: campo de partículas de energía violeta/aqua
const cv=document.getElementById('c'),x=cv.getContext('2d');let W,H,P=[];
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
addEventListener('resize',rs);rs();
for(let i=0;i<90;i++)P.push({x:Math.random()*W,y:Math.random()*H,v:.2+Math.random()*.5,r:Math.random()*1.8+.4,h:Math.random()>.5?'124,92,255':'63,242,198'});
(function loop(){x.clearRect(0,0,W,H);for(const p of P){p.y-=p.v;if(p.y<-5){p.y=H+5;p.x=Math.random()*W;}x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fillStyle='rgba('+p.h+',.7)';x.fill();}if(!reduce)requestAnimationFrame(loop);})();
</script>
</body>
</html>
